<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rice Quality Analyzer - Pro</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6; color: #333; text-align: center; margin: 0; padding: 10px;
            padding-top: env(safe-area-inset-top, 20px); 
        }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .container { max-width: 500px; margin: 0 auto; }
        canvas {
            border: 2px solid #34495e; border-radius: 8px; width: 100%; height: auto; background-color: #000;
        }
        .status {
            margin: 5px 0 15px 0; padding: 10px; background-color: #e74c3c; color: white; border-radius: 5px; font-weight: bold; font-size: 14px;
        }
        .controls {
            background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-top: 15px; text-align: left;
        }
        .control-group { margin-bottom: 10px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; color: #555;}
        input[type=range] { width: 100%; margin-top: 5px; }
        
        /* නව Checkbox නිර්මාණ */
        .checkbox-container {
            display: flex; flex-direction: column; gap: 10px; margin-top: 15px;
        }
        .checkbox-item {
            display: flex; align-items: center; justify-content: center; font-weight: bold; background: #e8f8f5; padding: 10px; border-radius: 5px;
        }
        .checkbox-item.flash { background: #fef9e7; color: #d35400; }
        input[type=checkbox] { transform: scale(1.5); margin-right: 10px; }
    </style>
</head>
<body>

    <h2>සහල් ප්‍රමිති පරීක්ෂාව</h2>
    <div id="statusMessage" class="status">OpenCV.js පූරණය වෙමින් පවතී...</div>

    <div class="container">
        <video id="videoInput" autoplay playsinline muted style="display:none;"></video>
        <canvas id="canvasOutput"></canvas>

        <div class="controls">
            <div class="checkbox-container">
                <div class="checkbox-item flash">
                    <input type="checkbox" id="torchToggle">
                    <label for="torchToggle">ෆ්ලෑෂ් ලයිට් ක්‍රියාත්මක කරන්න (Flashlight)</label>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" id="showMask">
                    <label for="showMask">කැමරාව දකින ආකාරය (Show Mask)</label>
                </div>
            </div>
            
            <p style="font-size: 12px; color: #7f8c8d; text-align: center; margin-top: 15px; margin-bottom: 5px;">අවශ්‍ය වර්ණය හඳුනාගන්නා තුරු පහත අගයන් වෙනස් කරන්න</p>

            <div class="control-group">
                <label>Value (අඳුරු බව) - උපරිමය: <span id="vMaxVal">80</span></label>
                <input type="range" id="vMax" min="0" max="255" value="80">
            </div>
            <div class="control-group">
                <label>ලපයේ අවම ප්‍රමාණය (Size): <span id="areaVal">200</span></label>
                <input type="range" id="minArea" min="50" max="1500" value="200">
            </div>
        </div>
    </div>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>

    <script>
        let video = document.getElementById('videoInput');
        let canvasOutput = document.getElementById('canvasOutput');
        let torchToggle = document.getElementById('torchToggle');
        let src, dst, cap, videoTrack;
        let streaming = false;

        document.getElementById('vMax').oninput = function() { document.getElementById('vMaxVal').innerText = this.value; }
        document.getElementById('minArea').oninput = function() { document.getElementById('areaVal').innerText = this.value; }

        function onOpenCvReady() {
            document.getElementById('statusMessage').innerText = 'කැමරාව සක්‍රිය කරමින්...';
            document.getElementById('statusMessage').style.backgroundColor = '#f39c12';

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } }, audio: false })
                .then(function(stream) {
                    video.srcObject = stream;
                    video.play();
                    
                    // Video Track එක හඳුනාගැනීම (Torch එක පාලනය කිරීමට)
                    videoTrack = stream.getVideoTracks()[0];

                    video.onloadedmetadata = () => {
                        video.width = video.videoWidth; video.height = video.videoHeight;
                        canvasOutput.width = video.videoWidth; canvasOutput.height = video.videoHeight;
                        streaming = true;
                        document.getElementById('statusMessage').style.display = 'none';
                        startProcessing();
                    };
                }).catch(function(err) {
                    document.getElementById('statusMessage').innerText = 'කැමරාවට අවසර ලබා දී නැත!';
                });
        }

        // ෆ්ලෑෂ් ලයිට් එක ක්‍රියාත්මක සහ අක්‍රිය කිරීම
        torchToggle.addEventListener('change', function(event) {
            if (videoTrack) {
                videoTrack.applyConstraints({
                    advanced: [{ torch: event.target.checked }]
                }).catch(err => {
                    console.log("Torch Error: ", err);
                    alert("ඔබේ ජංගම දුරකථනය හෝ බ්‍රව්සරය මෙම පහසුකමට සහාය නොදක්වයි.");
                    event.target.checked = false; // Checkbox එක නැවත අක්‍රිය කිරීම
                });
            }
        });

        function startProcessing() {
            src = new cv.Mat(video.height, video.width, cv.CV_8UC4);
            dst = new cv.Mat(video.height, video.width, cv.CV_8UC4);
            let hsv = new cv.Mat();
            let mask = new cv.Mat();
            cap = new cv.VideoCapture(video);

            function processVideo() {
                if (!streaming) { src.delete(); dst.delete(); hsv.delete(); mask.delete(); return; }
                let begin = Date.now();
                try {
                    cap.read(src);
                    src.copyTo(dst);
                    cv.cvtColor(src, hsv, cv.COLOR_RGBA2RGB);
                    cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);

                    let vMaxLimit = parseInt(document.getElementById('vMax').value);
                    let minAreaLimit = parseInt(document.getElementById('minArea').value);
                    let showMask = document.getElementById('showMask').checked;

                    let low = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [0, 0, 0, 0]);
                    let high = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [180, 255, vMaxLimit, 0]);

                    cv.inRange(hsv, low, high, mask);

                    if (showMask) {
                        cv.imshow('canvasOutput', mask);
                    } else {
                        let contours = new cv.MatVector();
                        let hierarchy = new cv.Mat();
                        cv.findContours(mask, contours, hierarchy, cv.RETR_CCOMP, cv.CHAIN_APPROX_SIMPLE);

                        for (let i = 0; i < contours.size(); ++i) {
                            let cnt = contours.get(i);
                            if (cv.contourArea(cnt) > minAreaLimit) {
                                let rect = cv.boundingRect(cnt);
                                let p1 = new cv.Point(rect.x, rect.y);
                                let p2 = new cv.Point(rect.x + rect.width, rect.y + rect.height);
                                cv.rectangle(dst, p1, p2, [255, 0, 0, 255], 2, cv.LINE_8, 0);
                            }
                            cnt.delete();
                        }
                        cv.imshow('canvasOutput', dst);
                        contours.delete(); hierarchy.delete();
                    }
                    low.delete(); high.delete();
                } catch (err) { console.log(err); }

                let delay = 1000 / 30 - (Date.now() - begin);
                setTimeout(processVideo, delay > 0 ? delay : 0);
            }
            setTimeout(processVideo, 0);
        }
    </script>
</body>
</html>
